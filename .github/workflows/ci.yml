name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # comms is unix-only today (internal/lock uses flock); no windows-latest.
        os: [ubuntu-latest, macos-latest]
        # Lower bound enforces the go.mod floor; upper bound tracks current.
        go: ['1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "::error::These files are not gofmt-clean:"; echo "$files"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test -race
        run: go test -race ./...
      - name: go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      # Pin the exact golangci-lint v2 version validated locally (the v6 action
      # targets golangci-lint v1; installing directly avoids that mismatch).
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run --timeout=5m

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
